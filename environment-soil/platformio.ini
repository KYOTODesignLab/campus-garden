; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:m5stick-c]
platform = espressif32
board = m5stick-c
framework = arduino
monitor_speed = 115200

; M5StickC Plus2 has 8MB flash (the m5stick-c board def defaults to 4MB).
board_upload.flash_size = 8MB
board_build.partitions = default_8MB.csv

lib_deps =
	m5stack/M5StickCPlus2
	adafruit/Adafruit SHT4x Library
	adafruit/Adafruit BusIO

; Pulled in transitively by M5StickCPlus2 but unused here, and its
; analogWriteResolution() call is incompatible with the current esp32 core.
lib_ignore = DFRobot_GP8XXX
